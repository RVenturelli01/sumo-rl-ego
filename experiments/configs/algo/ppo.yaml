algorithm: PPO

model:
  policy: "MlpPolicy"

  learning_rate: 3e-4
  gamma: 0.99
  gae_lambda: 0.95

  # --- rollout ---
  n_steps: 1024        # 1024 * 8 = 8192 samples/update
  batch_size: 256
  n_epochs: 10

  # --- losses ---
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

  clip_range: 0.2

  # exploration
  use_sde: false
  sde_sample_freq: 4

  policy_kwargs:
    net_arch: [256, 256]

training:
  total_timesteps: 1000000
  log_interval: 5