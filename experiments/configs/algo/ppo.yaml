algorithm: PPO


model:
  policy: MlpPolicy

  learning_rate: 3.0e-4     
  gamma: 0.99               
  gae_lambda: 0.95         

  n_steps: 1024             
  batch_size: 256            
  n_epochs: 5               

  clip_range: 0.2             
  ent_coef: 0.01              
  vf_coef: 0.5                    

  policy_kwargs:
    net_arch: [32, 32] 

  verbose: 1


training:
  total_timesteps: 10000    
  log_interval: 1
  reset_num_timesteps: true