
meta:
  name: test_dqn_highway
  description: A test DQN configuration for the highway environment.
  tensorboard_log: ./tensorboard_logs/dqn_highway


# Environment description (for documentation purposes only)
env_description:
  name: highway-3lanes
  observation: 
  action:
  reward: finish the route as fast as possible, while avoiding collisions


sumo_config:
  sumocfg_file: networks/highway_fast/highway.sumocfg
  ego_id: ego
  time_step: 0.5
  max_steps: 50
  sumo_seed: 0


algorithm: DQN
policy: MlpPolicy


model:
  learning_rate: 3.0e-4  # must be float
  gamma: 0.98

  buffer_size: 1000
  learning_starts: 500
  batch_size: 64

  train_freq: 1
  gradient_steps: 1
  target_update_interval: 500

  exploration_fraction: 0.4
  exploration_final_eps: 0.05

  policy_kwargs:
    net_arch: [64, 64]

  verbose: 1


training:
  total_timesteps: 1000
  log_interval: 10