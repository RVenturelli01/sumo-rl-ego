run:
  name: "eval"
  n_episodes: 100
  seed: 0
  output_dir: /work/fis1/sumo-human-feedback-rl/sumo-rl-ego/outputs


# only one between: model_id | model_path | policy_id | policy_class 
source: 
  model_id: null 
  model_path: null
  policy_id: null
  policy_class:
    __target__: null


wandb:
  enabled: false
  kwargs:
    project: "sre-eval"
    group: ${env.id}_${env.kwargs.ego}_${env.kwargs.reward}
    name: ${run.name}
    mode: "online"
    dir: ${run.output_dir}/wandb
    notes: null


env:
  id: "HighwayEgo-v0"
  kwargs:
    reward: "fast"
    ego: "discrete"


hydra:
  job:
    chdir: true
  run:
    dir: ${run.output_dir}/eval/${now:%Y-%m-%d}_${now:%H-%M-%S}_${run.name}
