
name: "eval"
n_episodes: 100
seed: 0
output_dir: ${hydra:runtime.output_dir}

wandb:
  enabled: false
  kwargs:
    project: "sre-eval"
    group: ${env.id}
    name: ${name}
    mode: "online"
    dir: ${output_dir}/wandb
    notes: null


# only one between: model_id | model_path | policy_id | policy_class 
source: 
  model_id: null 
  model_path: null
  policy_id: null
  policy_class:
    __target__: null


env:
  id: "HighwayEgo-v0"
  kwargs:
    reward: "fast"
    ego: "discrete"


hydra:
  job:
    chdir: true
  run:
    dir: ${hydra:runtime.cwd}/outputs/eval/${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
