run:
  name: "dqn_ft"
  seed: 0
  output_dir: ${oc.env:HOME}/projects/sumo-human-feedback-rl/sumo-rl-ego/outputs


wandb:
  enabled: true
  kwargs:
    project: "sre-train"
    group: ${env.id}_${env.kwargs.ego}_${env.kwargs.reward}
    name: ${run.name}
    mode: "online"
    dir: "/tmp/wandb"
    notes: null

source:
  model_path: null
  replay_buffer_path: null

env:
  id: "HighwayEgo-v0"
  n_envs: 1
  kwargs: 
    reward: "fast"
    ego: "discrete"

model:
  algo: "DQN"
  kwargs: {}
  overrides:
    learning_starts: 0
    exploration_fraction: 0.1
    exploration_initial_eps: 0.05
    exploration_final_eps: 0.005

learn:
  rolling_window: 1000
  kwargs:
    total_timesteps: 1e6
    log_interval: 500
    reset_num_timesteps: false
    progress_bar: true

hydra:
  job:
    chdir: true
  run:
    dir: ${run.output_dir}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${run.name}
