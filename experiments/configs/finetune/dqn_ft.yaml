run:
  name: "dqn_v1_ft2"
  seed: 0
  output_dir: /work/fis1/sumo-human-feedback-rl/sumo-rl-ego/outputs


wandb:
  enabled: true
  kwargs:
    project: "sre-train"
    group: ${env.id}_${env.kwargs.ego}_${env.kwargs.reward}
    name: ${run.name}
    mode: "online"
    dir: ${hydra:runtime.cwd}/wandb
    sync_tensorboard: true
    notes: null

source:
  model_path: null
  replay_buffer_path: null

env:
  id: "HighwayEgo-v0"
  n_envs: 16
  kwargs: 
    reward: "fast"
    ego: "discrete"

model:
  algo: "DQN"
  kwargs: {}
  overrides:
    exploration_initial_eps: 0.005
    exploration_final_eps: 0.002
    exploration_fraction: 0.5
    learning_rate: 3e-5

learn:
  rolling_window: 1000
  kwargs:
    total_timesteps: 1e6
    log_interval: 500
    reset_num_timesteps: true
    progress_bar: true

hydra:
  job:
    chdir: true
  run:
    dir: ${run.output_dir}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${run.name}
