
meta:
  name: my_policy_highway
  description: A custom policy configuration for the highway environment.
  seed: 0


env:
  sumocfg_files: 
    - scenarios/highway_fast/highway.sumocfg
    - scenarios/highway_fast_modified/highway.sumocfg
    - scenarios/highway_lane3_occupied/highway.sumocfg
    - scenarios/highway_overtake_lane0_3lanes/highway.sumocfg
    - scenarios/highway_slow_3lanes/highway.sumocfg
  ego:
    class: sumo_rl_ego.plugins.egos.highway_discrete_ego.HighwayDiscreteEgo
    args:
      dec_value: -4
  obs:
    class: sumo_rl_ego.plugins.observations.speed_dist_ttc_obs.SpeedDistTTCObs
    args:
  reward:
    class: sumo_rl_ego.plugins.rewards.highway_speed_reward.HighwaySpeedReward
    args:
  metrics:
    class: sumo_rl_ego.plugins.metrics.my_metrics.MyMetrics
    args:

sumo_config:
  ego_id: ego
  time_step: 0.5
  max_steps: 800

policy:
  class: sumo_rl_ego.plugins.policies.my_policy.MyPolicy
  args: