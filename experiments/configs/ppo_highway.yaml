meta:
  name: test_ppo_highway
  description: PPO continuous control on 3-lane highway overtaking.
  seed: 0


env:
  sumocfg_files: 
    - scenarios/highway_fast/highway.sumocfg
    - scenarios/highway_fast_modified/highway.sumocfg
    - scenarios/highway_lane3_occupied/highway.sumocfg
    - scenarios/highway_overtake_lane0_3lanes/highway.sumocfg
    - scenarios/highway_slow_3lanes/highway.sumocfg

  ego:
    class: plugins.egos.highway_continuous_ego.HighwayContinuousEgo
    args:
      max_acc: 2.0
      max_dec: -4.0
      lc_duration: 0

  obs:
    class: plugins.observations.speed_dist_ttc_obs.SpeedDistTTCObs
    args:

  reward:
    class: plugins.rewards.highway_speed_reward.HighwaySpeedReward
    args:

  metrics:
    class: plugins.metrics.my_metrics.MyMetrics
    args:


sumo_config:
  ego_id: ego
  time_step: 0.5
  max_steps: 800


# =======================
# PPO CONFIG
# =======================

algorithm: PPO
policy: MlpPolicy


model:
  learning_rate: 3.0e-4        # standard PPO safe default
  gamma: 0.99                  # long-term planning
  gae_lambda: 0.95             # bias/variance tradeoff (default good)

  n_steps: 1024                # rollout length (molto importante)
  batch_size: 256              # minibatch SGD
  n_epochs: 5                 # update per rollout

  clip_range: 0.2              # trust region PPO
  ent_coef: 0.01               # incoraggia esplorazione (importante highway)
  vf_coef: 0.5                 # value loss weight
  # max_grad_norm: 0.5           # stabilità

  policy_kwargs:
    net_arch: [32, 32]       # più capacità per guida continua

  verbose: 1


training:
  total_timesteps: 10000      # PPO ha bisogno di più dati rispetto a DQN
  log_interval: 1
  reset_num_timesteps: true