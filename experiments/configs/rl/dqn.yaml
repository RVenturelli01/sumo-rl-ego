
algorithm: DQN


model:
  policy: MlpPolicy

  learning_rate: 5.0e-4  
  gamma: 0.99             

  buffer_size: 30000    
  learning_starts: 1000   
  batch_size: 500         

  train_freq: 1           
  gradient_steps: 1     

  target_update_interval: 1000  

  exploration_fraction: 0.6     
  exploration_initial_eps: 0.8
  exploration_final_eps: 0.1  

  policy_kwargs:
    net_arch: [20, 20] 

  verbose: 1            



training:
  total_timesteps: 30000       
  log_interval: 10             
  reset_num_timesteps: true   