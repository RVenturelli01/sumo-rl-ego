algorithm: DQN

model:
  policy: MlpPolicy

  learning_rate: 3e-4

  gamma: 0.99

  buffer_size: 300000

  learning_starts: 5000

  batch_size: 128

  train_freq: 4
  gradient_steps: 1

  target_update_interval: 5000

  exploration_fraction: 0.4
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.05

  policy_kwargs:
    net_arch: [256, 256]

  verbose: 1


training:
  total_timesteps: 400000
  log_interval: 50
  reset_num_timesteps: true