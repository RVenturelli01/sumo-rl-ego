algorithm: DQN

model:
  policy: MlpPolicy
  
  # Increased learning rate slightly for faster convergence in short windows
  learning_rate: 5.0e-4 
  gamma: 0.9 # Lowered gamma: in congestion, immediate rewards (gaps/speed) matter more than long-term future states

  buffer_size: 200000 # Larger buffer to store more diverse "near-miss" or "successful pass" scenarios
  learning_starts: 1000
  batch_size: 128 # Smaller batch size often helps DQN stabilize faster in discrete action spaces

  train_freq: 1 # Update every step to maximize learning from every interaction
  gradient_steps: 1

  target_update_interval: 1000 # Faster target updates to keep up with the changing traffic patterns

  # More aggressive exploration curve
  exploration_fraction: 0.3 # Reach final_eps sooner so it can spend more time refining the policy
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.02 # Lower final epsilon to ensure it follows the learned optimal path

  policy_kwargs:
    # Deeper network to handle the 20-feature input complexity
    net_arch: [256, 256]

  verbose: 1

training:
  # 60k is very low for highway navigation; 200k-500k is usually the sweet spot for stability
  # total_timesteps: 30000 
  total_timesteps: 2000
  log_interval: 20
  # reset_num_timesteps: true
  reset_num_timesteps: false