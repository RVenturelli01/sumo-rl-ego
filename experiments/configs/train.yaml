wandb:
  project: "sre_train"
  run_name: ${name}
  sync_tensorboard: true


defaults:
  - algo: dqn
  - _self_

env: "highway_e1_o2_rfast"

resources:
  n_envs: 8
  device: cpu


name: train_${env}_${algo.algorithm}_v2

seed: 0

note: 

checkpoint:
  load_path: null


hydra:
  job:
    chdir: true
  run:
    dir: outputs/${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
    subdir: ${hydra.job.num}