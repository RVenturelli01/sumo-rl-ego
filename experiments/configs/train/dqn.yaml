run:
  name: "dqn_v2"
  seed: 0
  output_dir: /work/fis1/sumo-human-feedback-rl/sumo-rl-ego/outputs


wandb:
  enabled: true
  kwargs:
    project: "sre-train"
    group: ${env.id}_${env.kwargs.ego}_${env.kwargs.reward}
    name: ${run.name}
    mode: "online"
    dir: ${run.output_dir}/wandb
    sync_tensorboard: true
    notes: null

env:
  id: "HighwayEgo-v0"
  n_envs: 16
  kwargs:
    reward: "fast"
    ego: "discrete"

model:
  algo: "DQN"
  kwargs:
    policy: MlpPolicy
    learning_rate: 0.0001
    buffer_size: 500000
    learning_starts: 10000
    batch_size: 512
    tau: 1.0
    gamma: 0.99
    train_freq: 4
    gradient_steps: 8
    replay_buffer_class: null
    replay_buffer_kwargs: null
    optimize_memory_usage: false
    n_steps: 1
    target_update_interval: 1000
    exploration_fraction: 0.3
    exploration_initial_eps: 0.5
    exploration_final_eps: 0.05
    max_grad_norm: 10
    stats_window_size: 100
    policy_kwargs:
      net_arch: [128, 128]
    verbose: 1
    seed: ${run.seed}
    device: "cpu"
    tensorboard_log: tensorboard

learn:
  rolling_window: 1000
  kwargs:
    total_timesteps: 2e6
    log_interval: 100
    reset_num_timesteps: false
    progress_bar: true


hydra:
  job:
    chdir: true
  run:
    dir: ${run.output_dir}/train/${now:%Y-%m-%d}_${now:%H-%M-%S}_${run.name}


