wandb_kwargs:
  project: "sre-train"
  group: ${env.id}
  name: ${name}
  sync_tensorboard: true
  dir: ${hydra:runtime.output_dir}/wandb
  notes: 


# EXPERIMENT
name: "dqn_v1"
seed: 0
finetuning: false



# ENV
env:
  id: "HighwayEgo-v0"
  n_envs: 16
  env_args:
    reward: "fast"
    ego: "discrete"


# TRAINING
learn_kwargs:
  total_timesteps: 2e6  # 500000
  log_interval: 100
  reset_num_timesteps: false 
  progress_bar: true
    

# ALGO
algo: 
  type: "DQN"
  algo_kwargs:
    policy: MlpPolicy
    learning_rate: 5e-4  # 1e-4
    buffer_size: 500000  # 1000000
    learning_starts: 10000  # 100
    batch_size: 128  # 32
    tau: 1.0  # 1.0
    gamma: 0.99  # 0.99
    train_freq: 4  # 4
    gradient_steps: 8  # 1
    replay_buffer_class: null
    replay_buffer_kwargs: null
    optimize_memory_usage: false
    n_steps: 1
    target_update_interval: 2000 
    exploration_fraction: 0.1  # 0.1
    exploration_initial_eps: 1.0  # 1.0
    exploration_final_eps: 0.05  # 0.05
    max_grad_norm: 10  # 10
    stats_window_size: 100  # 100
    policy_kwargs: 
      net_arch: [256, 256]  # None
    verbose: 1
    seed: ${seed}
    device: cpu
    tensorboard_log: ${hydra:runtime.output_dir}/tensorboard



hydra:
  job:
    chdir: true
  run:
    dir: ${hydra:runtime.cwd}/outputs/${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}