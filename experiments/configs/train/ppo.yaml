run:
  name: "ppo_v0"
  seed: 0
  output_dir: null


wandb:
  enabled: true
  kwargs:
    project: "sre-train"
    group: ${env.id}_${env.kwargs.ego}_${env.kwargs.reward}
    name: ${run.name}
    mode: "online"
    dir: ${hydra:runtime.cwd}/wandb
    sync_tensorboard: true
    notes: null

env:
  id: "HighwayEgo-v0"
  n_envs: 16
  kwargs:
    reward: "fast"
    ego: "continuous"

model:
  algo: "PPO"
  kwargs:
    policy: "MlpPolicy"
    learning_rate: 3e-4
    n_steps: 1024  # 2048
    batch_size: 256  # 64
    n_epochs: 5
    gamma: 0.995
    gae_lambda: 0.95
    clip_range: 0.2
    clip_range_vf: null
    normalize_advantage: true
    ent_coef: 0.03
    vf_coef: 0.8
    max_grad_norm: 0.5
    use_sde: false
    sde_sample_freq: -1
    rollout_buffer_class: null
    rollout_buffer_kwargs: {}
    target_kl: null
    stats_window_size: 100
    policy_kwargs: 
      net_arch: [256, 128]
    seed: ${run.seed}
    device: "cpu"
    tensorboard_log: ${hydra:runtime.cwd}/tensorboard
    verbose: 1

learn:
  rolling_window: 1000
  kwargs:
    total_timesteps: 2e6
    log_interval: 1  # every rollout make a log (rollout = n_steps * n_envs)
    reset_num_timesteps: false
    progress_bar: true


hydra:
  job:
    chdir: true
  run:
    dir: ${run.output_dir}/train/${now:%Y-%m-%d}_${now:%H-%M-%S}_${run.name}


