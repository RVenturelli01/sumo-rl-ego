algo:
  algorithm: DQN
  model:
    policy: MlpPolicy
    learning_rate: 5.0e-05
    gamma: 0.95
    buffer_size: 100000
    learning_starts: 5000
    batch_size: 512
    train_freq: 4
    gradient_steps: 4
    target_update_interval: 5000
    exploration_fraction: 0.3
    exploration_initial_eps: 1.0
    exploration_final_eps: 0.02
    policy_kwargs:
      net_arch:
      - 150
      - 150
    verbose: 1
  training:
    total_timesteps: 500000
    log_interval: 500
    reset_num_timesteps: true
env: highway_e1_o2_rfast
resources:
  n_envs: 4
  device: cpu
name: train_${env}_${algo.algorithm}
seed: 0
note: null
checkpoint:
  load_path: null
