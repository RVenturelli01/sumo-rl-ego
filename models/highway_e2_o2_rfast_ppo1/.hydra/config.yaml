algo:
  algorithm: PPO
  model:
    policy: MlpPolicy
    learning_rate: 0.0003
    gamma: 0.99
    gae_lambda: 0.95
    n_steps: 1024
    batch_size: 256
    n_epochs: 10
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    clip_range: 0.2
    use_sde: false
    sde_sample_freq: 4
    policy_kwargs:
      net_arch:
      - 256
      - 256
  training:
    total_timesteps: 1000000
    log_interval: 5
env: highway_e2_o2_rfast
resources:
  n_envs: 8
  device: cpu
name: train_${env}_${algo.algorithm}
seed: 0
note: null
checkpoint:
  load_path: null
