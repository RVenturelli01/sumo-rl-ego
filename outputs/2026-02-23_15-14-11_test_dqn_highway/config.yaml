algorithm: DQN
env:
  ego:
    args:
      dec_value: -4
    class: plugins.egos.highway_discrete_ego.HighwayDiscreteEgo
  metrics:
    args: null
    class: plugins.metrics.my_metrics.MyMetrics
  obs:
    args: null
    class: plugins.observations.speed_dist_ttc_obs.SpeedDistTTCObs
  reward:
    args: null
    class: plugins.rewards.highway_speed_reward.HighwaySpeedReward
  seed: 0
meta:
  description: A test DQN configuration for the highway environment.
  name: test_dqn_highway
model:
  batch_size: 128
  buffer_size: 30000
  exploration_final_eps: 0.05
  exploration_fraction: 0.6
  exploration_initial_eps: 0.5
  gamma: 0.99
  gradient_steps: 1
  learning_rate: 0.0003
  learning_starts: 2000
  policy_kwargs:
    net_arch:
    - 32
    - 32
  seed: 0
  target_update_interval: 1000
  train_freq: 1
  verbose: 1
policy: MlpPolicy
sumo_config:
  ego_id: ego
  max_steps: 800
  seed: 0
  sumocfg_file: scenarios/highway_fast/highway.sumocfg
  time_step: 0.5
training:
  log_interval: 10
  reset_num_timesteps: true
  total_timesteps: 30000
